name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

jobs:
  pending-provider:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: >-
          echo "Provider-specific deployment is intentionally pending. Configure
          infra/terraform and secret bindings after selecting the cloud target."
