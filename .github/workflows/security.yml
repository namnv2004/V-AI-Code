name: Security

on:
  pull_request:
  schedule:
    - cron: "17 3 * * 1"

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high
      - uses: astral-sh/setup-uv@v6
        with:
          version: 0.11.28
      - run: uv export --project be --no-dev --no-hashes --format requirements.txt > /tmp/vai-code-requirements.txt
      - run: uvx pip-audit --requirement /tmp/vai-code-requirements.txt

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
